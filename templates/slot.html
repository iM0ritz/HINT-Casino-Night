<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine {{ slot_id }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="slot-body">
    <div id="jackpot-overlay" class="hidden">
        <div class="sunburst"></div>
        <div id="coin-container"></div>
        <div class="jackpot-content">
            <h1 class="jackpot-title">JACKPOT!</h1>
            <div id="jackpot-counter">0</div>
            <p id="jackpot-continue" class="hidden">PRESS SPACE TO CONTINUE</p>
        </div>
    </div>

    <div id="locked-overlay" class="overlay">
        <h1 id="overlay-text">MACHINE LOCKED</h1>
        <p id="overlay-subtext">Please see the Admin to Buy-In.</p>
    </div>

    <div class="game-layout">
        
        <aside class="paytable">
            <h3>PAYOUTS</h3>
            <div class="pay-row jackpot-row">
                <img src="{{ url_for('static', filename='assets/HINT_Logo.png') }}" alt="Jackpot">
                <span id="pay-jackpot">3x = 0 (75x)</span>
            </div>
            <div class="pay-row">
                <img src="{{ url_for('static', filename='assets/HiEd_Logo.png') }}" alt="Medium">
                <span id="pay-medium">3x = 0 (15x)</span>
            </div>
            <div class="pay-row">
                <img src="{{ url_for('static', filename='assets/HIKE_Logo.png') }}" alt="Frequent">
                <span id="pay-frequent">3x = 0 (2x)</span>
            </div>
        </aside>

        <div class="slot-container">
            <header class="slot-header">
                <h2 class="machine-title">Machine #{{ slot_id }}</h2>
                
                <p id="win-message" class="win-message">&nbsp;</p>
            </header>

            <div class="reels-bg">
                <div class="reels-container">
                    <div class="reel reel-gold" id="reel-1"><img src="{{ url_for('static', filename='assets/HINT_Logo.png') }}" id="img-1"></div>
                    <div class="reel reel-gold" id="reel-2"><img src="{{ url_for('static', filename='assets/HINT_Logo.png') }}" id="img-2"></div>
                    <div class="reel reel-gold" id="reel-3"><img src="{{ url_for('static', filename='assets/HINT_Logo.png') }}" id="img-3"></div>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-box">Bet<br><span id="bet-display">0</span></div>
                <div class="stat-box">Remaining Spins<br><span id="spins-display">0</span></div>
                <div class="stat-box total-win-box">Total Win<br><span id="winnings-display">0</span></div>
            </div>

            <div class="controls-area">
                <div class="buttons-row">
                    <button id="spin-button" class="btn-spin" onclick="spinReels()" disabled>SPIN (Spacebar)</button>
                    <button id="autospin-button" class="btn-autospin" onclick="toggleAutoSpin()" disabled>AUTO OFF</button>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        const currentSlotId = {{ slot_id }};
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
