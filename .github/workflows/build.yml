name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Add any other required libraries (like flask) here
        pip install flask pyinstaller

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --name "CasinoNightSlots" --onefile --add-data "templates;templates" --add-data "static;static" app.py

    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: CasinoNight-Windows-App
        path: dist/CasinoNightSlots.exe